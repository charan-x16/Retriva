# Runs Qdrant, the FastAPI backend, and the Streamlit frontend.

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-Retriva}
      QDRANT_DENSE_VECTOR_NAME: ${QDRANT_DENSE_VECTOR_NAME:-dense}
      QDRANT_SPARSE_VECTOR_NAME: ${QDRANT_SPARSE_VECTOR_NAME:-bm25}
      QDRANT_RECREATE_COLLECTION: ${QDRANT_RECREATE_COLLECTION:-false}
      QDRANT_CLOUD_INFERENCE: ${QDRANT_CLOUD_INFERENCE:-true}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-base-en-v1.5}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-768}
      BM25_MODEL: ${BM25_MODEL:-qdrant/bm25}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-base}
      RERANKER_USE_FP16: ${RERANKER_USE_FP16:-false}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-.cache/models}
      EVAL_DB_PATH: ${EVAL_DB_PATH:-backend/evaluation/eval_log.db}
      HF_TOKEN: ${HF_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
      VISUAL_OPENROUTER_MODEL: ${VISUAL_OPENROUTER_MODEL:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      ENABLE_CRAG: ${ENABLE_CRAG:-true}
      ENABLE_QUERY_REWRITE: ${ENABLE_QUERY_REWRITE:-true}
      CRAG_GRADE_THRESHOLD: ${CRAG_GRADE_THRESHOLD:-0.7}
      AUTO_TEXT_GRADE_THRESHOLD: ${AUTO_TEXT_GRADE_THRESHOLD:-0.7}
      VISUAL_INDEX_MODE: ${VISUAL_INDEX_MODE:-auto}
      ENABLE_VISUAL_FALLBACK: ${ENABLE_VISUAL_FALLBACK:-true}
      COLPALI_MODEL: ${COLPALI_MODEL:-vidore/colpali-v1.2}
      COLPALI_COLLECTION_NAME: ${COLPALI_COLLECTION_NAME:-retriva_visual_pages}
      VISUAL_PAGE_IMAGE_DIR: ${VISUAL_PAGE_IMAGE_DIR:-storage/visual_pages}
      VISUAL_ANSWER_MAX_IMAGES: ${VISUAL_ANSWER_MAX_IMAGES:-3}
    depends_on:
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend
