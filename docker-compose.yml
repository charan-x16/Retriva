# Runs Qdrant, the FastAPI backend, and the Streamlit frontend.

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: ${QDRANT_URL:-${QDRANT_ENDPOINT:-${QDARANT_ENDPOINT:-http://qdrant:6333}}}
      QDRANT_ENDPOINT: ${QDRANT_ENDPOINT:-}
      QDARANT_ENDPOINT: ${QDARANT_ENDPOINT:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-retriva_chunks}
      QDRANT_DENSE_VECTOR_NAME: ${QDRANT_DENSE_VECTOR_NAME:-dense}
      QDRANT_SPARSE_VECTOR_NAME: ${QDRANT_SPARSE_VECTOR_NAME:-bm25}
      QDRANT_RECREATE_COLLECTION: ${QDRANT_RECREATE_COLLECTION:-false}
      QDRANT_CLOUD_INFERENCE: ${QDRANT_CLOUD_INFERENCE:-true}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-base-en-v1.5}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-768}
      BM25_MODEL: ${BM25_MODEL:-qdrant/bm25}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANKER_USE_FP16: ${RERANKER_USE_FP16:-true}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-.cache/models}
      EVAL_DB_PATH: ${EVAL_DB_PATH:-backend/evaluation/eval_log.db}
      HF_TOKEN: ${HF_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
    depends_on:
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend
